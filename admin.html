<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - โครงการ วมว. มน.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (!localStorage.theme) localStorage.theme = 'light';
        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.4s, color 0.4s; background-color: #f1f5f9; }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255,255,255,0.8); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255,255,255,0.05); }
        .btn-liquid { position: relative; overflow: hidden; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .btn-liquid::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0)); pointer-events: none; }
        .btn-liquid:active { transform: scale(0.96); }
        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.6); color: #334155; }
        .dark .glass-input { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; }
        .dark table th { color: #cbd5e1 !important; border-color: rgba(255,255,255,0.1); }
        .dark table td { color: #f1f5f9 !important; border-color: rgba(255,255,255,0.05); }
        .dark .bg-slate-50 { background-color: rgba(15, 23, 42, 0.4) !important; }
        .swal2-popup { backdrop-filter: blur(20px) !important; background: rgba(255,255,255,0.85) !important; border-radius: 2rem !important; border: 1px solid rgba(255,255,255,0.5); }
        .dark .swal2-popup { background: rgba(30,41,59,0.85) !important; border: 1px solid rgba(255,255,255,0.1); color: #f1f5f9 !important; }
        .dark .swal2-title, .dark .swal2-html-container { color: #f1f5f9 !important; }
        
        .swal2-success-circular-line-left, .swal2-success-circular-line-right, .swal2-success-fix, .swal2-success-ring { display: none !important; background-color: transparent !important; }
        .swal2-icon.swal2-success { border-color: #a5dc86 !important; background: transparent !important; }
    </style>
</head>
<body class="pb-10">

    <nav class="glass-panel border-b-0 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 px-4 py-4">
            <div class="flex items-center gap-4">
                <div>
                    <h1 class="text-lg sm:text-xl font-bold text-slate-800 dark:text-white flex items-center"><i data-lucide="shield" class="w-5 h-5 mr-2 text-cyan-600 dark:text-cyan-400"></i> Administrator</h1>
                    <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-1">ผู้ดูแลระบบ: โครงการ วมว. มน.</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="btn-liquid bg-slate-200/50 dark:bg-slate-700/50 p-2.5 rounded-full text-slate-700 dark:text-slate-200 outline-none"><i data-lucide="moon" class="w-5 h-5 dark:hidden"></i><i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i></button>
                <button onclick="logout()" class="text-xs sm:text-sm text-red-600 dark:text-red-400 font-medium bg-red-50/50 dark:bg-red-900/20 px-4 py-2.5 rounded-xl border border-red-100 dark:border-red-800 flex items-center btn-liquid"><i data-lucide="log-out" class="w-4 h-4 mr-1"></i> <span class="hidden sm:inline">ออกจากระบบ</span></button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto mt-4 sm:mt-8 px-3 sm:px-4 space-y-4 sm:space-y-6">

        <div class="glass-panel rounded-3xl p-4 sm:p-6 flex flex-col items-center">
            <h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white mb-4 w-full flex items-center"><i data-lucide="search" class="w-5 h-5 mr-2"></i> ค้นหาข้อมูลนักเรียน / โครงงาน</h2>
            <div class="relative w-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="search" class="h-5 w-5 text-slate-400"></i></div>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="พิมพ์ รหัสโครงงาน, รหัสนักเรียน หรือ ชื่อ-นามสกุล..." class="w-full pl-11 pr-4 py-3.5 sm:py-4 text-sm sm:text-base rounded-2xl glass-input focus:ring-4 focus:ring-cyan-100 dark:focus:ring-cyan-900 outline-none transition-all font-medium">
            </div>
        </div>

        <div id="loadingData" class="text-center py-10 sm:py-16 text-sm text-slate-500 flex flex-col items-center glass-panel rounded-3xl"><svg class="animate-spin h-6 w-6 sm:h-8 sm:w-8 text-cyan-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>กำลังโหลดข้อมูลทั้งระบบ...</div>

        <div id="overviewSection" class="glass-panel rounded-3xl p-4 sm:p-6 hidden relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-cyan-500"></div>
            <h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white mb-3 sm:mb-5 border-b border-slate-200 dark:border-slate-700 pb-2 sm:pb-3 flex items-center ml-2"><i data-lucide="bar-chart-2" class="w-5 h-5 sm:w-6 sm:h-6 mr-2 text-cyan-600 dark:text-cyan-400"></i> ภาพรวมโครงงานทั้งหมดในระบบ</h2>
            <div class="overflow-x-auto w-full pb-2">
                <table class="w-full text-left"><thead class="bg-slate-50 uppercase border-b text-[10px] sm:text-sm"><tr><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold whitespace-nowrap">รหัสโครงงาน</th><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold min-w-[150px]">นักเรียนในกลุ่ม</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">โครงร่าง</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">ความก้าวหน้า</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">ฉบับสมบูรณ์</th></tr></thead><tbody id="overviewTableBody"></tbody></table>
            </div>
        </div>

        <div id="allWorksSection" class="glass-panel rounded-3xl p-4 sm:p-6 hidden relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-slate-400"></div>
            <h2 class="text-base sm:text-lg font-bold text-slate-800 dark:text-white mb-3 sm:mb-5 border-b border-slate-200 dark:border-slate-700 pb-2 sm:pb-3 flex items-center ml-2"><i data-lucide="folder" class="w-5 h-5 sm:w-6 sm:h-6 mr-2 text-slate-700 dark:text-slate-300"></i> ประวัติการส่งงานทั้งหมด</h2>
            <div class="overflow-x-auto w-full pb-2">
                <table class="w-full text-left"><thead class="bg-slate-50 uppercase border-b text-[10px] sm:text-sm"><tr><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold">เวลา</th><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold min-w-[150px]">ข้อมูลนักเรียน</th><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold">ประเภทงาน</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">ไฟล์แนบ</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">สถานะปัจจุบัน</th></tr></thead><tbody id="allWorksTableBody"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz4VLdHZ_TrksKu_zHsmUpd-ztg1jbMEvPJD6xl4BdnxoW-4F_fQ6bdZSji5ejh6NfJJQ/exec';
        lucide.createIcons();

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.theme = 'light'; } 
            else { html.classList.add('dark'); localStorage.theme = 'dark'; }
        }
        
        const adminRole = localStorage.getItem('userRole'); 
        if (adminRole !== 'admin') window.location.href = 'index.html'; 

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        function getProcessedImgUrl(url, studentName) {
            if (!url || url === "-") return `https://ui-avatars.com/api/?name=${encodeURIComponent(studentName)}&background=random`;
            if (url.includes('drive.google.com')) { const match = url.match(/[-\w]{25,}/); if (match) return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w500`; }
            return url;
        }

        function formatDateTime(rawStr) {
            if (!rawStr) return "-"; let d = new Date(rawStr);
            if (!isNaN(d.getTime())) return d.toLocaleDateString('th-TH') + '<br><span class="text-[9px] sm:text-[10px] opacity-70">' + d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) + ' น.</span>';
            return rawStr;
        }

        function viewStudentPopup(name, id, phone, picUrl) {
            Swal.fire({
                html: `<div class="text-center pt-2"><img src="${picUrl}" class="w-24 h-24 sm:w-32 sm:h-32 rounded-full object-cover mx-auto mb-4 border-[4px] border-cyan-50 dark:border-cyan-900/50 shadow-md bg-white" loading="lazy"><h3 class="text-lg sm:text-xl font-bold text-slate-800 dark:text-white leading-tight">${name}</h3><p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 mb-5 mt-1">รหัสประจำตัว: ${id}</p><div class="bg-cyan-50 dark:bg-cyan-900/30 rounded-2xl p-3 sm:p-4 inline-block w-full max-w-[200px] border border-cyan-100 dark:border-cyan-800"><p class="text-[10px] sm:text-xs text-cyan-600 dark:text-cyan-400 mb-1 font-semibold uppercase flex items-center justify-center"><i data-lucide="phone" class="w-3 h-3 mr-1"></i> เบอร์โทรติดต่อ</p><p class="text-base sm:text-lg font-bold text-cyan-800 dark:text-cyan-300">${phone || 'ไม่มีข้อมูล'}</p></div></div>`,
                showConfirmButton: true, confirmButtonText: 'ปิดหน้าต่าง', confirmButtonColor: '#334155', customClass: { popup: 'rounded-[2rem] p-4 sm:p-6' }, backdrop: `rgba(15, 23, 42, 0.7)`, didOpen: () => { lucide.createIcons(); }
            });
        }

        window.allProjects = []; window.allSubmissions = [];

        async function loadDashboard() {
            try {
                const response = await fetch(API_URL); const data = await response.json();
                if (data.status === 'success') {
                    window.allProjects = data.projects || []; window.allSubmissions = data.submissions || [];
                    const allProjectIds = [...new Set(window.allProjects.map(p => p['รหัสโครงงาน']).filter(id => id && id.toString().trim() !== ""))];
                    renderOverviewTable(allProjectIds, window.allSubmissions); renderAllWorksTable(window.allSubmissions.slice().reverse()); 
                    document.getElementById('loadingData').style.display = 'none'; document.getElementById('overviewSection').classList.remove('hidden'); document.getElementById('allWorksSection').classList.remove('hidden');
                }
            } catch (error) { document.getElementById('loadingData').innerHTML = `<span class="text-red-500 font-semibold">❌ โหลดข้อมูลล้มเหลว</span>`; }
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filteredProjects = window.allProjects.filter(p => {
                const pid = (p['รหัสโครงงาน'] || "").toString().toLowerCase(); const sid = (p['รหัสนักเรียน'] || "").toString().toLowerCase(); const name = `${p['ชื่อ'] || ""} ${p['นามสกุล'] || ""}`.toLowerCase();
                return pid.includes(query) || sid.includes(query) || name.includes(query);
            });
            const filteredProjectIds = [...new Set(filteredProjects.map(p => p['รหัสโครงงาน']).filter(id => id))];
            const filteredSubmissions = window.allSubmissions.filter(s => {
                const pid = (s['รหัสโครงงาน'] || "").toString().toLowerCase(); const sid = (s['รหัสนักเรียน'] || "").toString().toLowerCase(); const name = `${s['ชื่อ'] || ""} ${s['นามสกุล'] || ""}`.toLowerCase();
                return pid.includes(query) || sid.includes(query) || name.includes(query);
            });
            renderOverviewTable(filteredProjectIds, window.allSubmissions); renderAllWorksTable(filteredSubmissions.slice().reverse());
        }

        function generateStudentInfoHtml(submission) {
            let targetProjId = (submission['รหัสโครงงาน'] || "").toString().replace(/\s/g, '').toLowerCase(); 
            let targetStuId = (submission['รหัสนักเรียน'] || "").toString().replace(/\s/g, '').toLowerCase(); 
            
            if (targetProjId === "") {
                for (let i = 0; i < window.allProjects.length; i++) {
                    if ((window.allProjects[i]['รหัสนักเรียน'] || "").toString().replace(/\s/g, '').toLowerCase() === targetStuId) {
                        targetProjId = (window.allProjects[i]['รหัสโครงงาน'] || "").toString().replace(/\s/g, '').toLowerCase(); break;
                    }
                }
            }

            let groupMembers = [];
            for (let i = 0; i < window.allProjects.length; i++) {
                let rowProjId = (window.allProjects[i]['รหัสโครงงาน'] || "").toString().replace(/\s/g, '').toLowerCase();
                let rowStuId = (window.allProjects[i]['รหัสนักเรียน'] || "").toString().replace(/\s/g, '').toLowerCase();
                let isMatch = false;
                if (targetProjId !== "" && rowProjId === targetProjId) isMatch = true; else if (targetStuId !== "" && rowStuId === targetStuId) isMatch = true;
                if (isMatch && rowStuId !== "") {
                    let originalStuId = (window.allProjects[i]['รหัสนักเรียน'] || "").toString().trim();
                    if (!groupMembers.find(m => m.id === originalStuId)) {
                        groupMembers.push({
                            id: originalStuId, firstName: (window.allProjects[i]['ชื่อ'] || "").toString().trim(), lastName: (window.allProjects[i]['นามสกุล'] || "").toString().trim(),
                            phone: (window.allProjects[i]['เบอร์โทรศัพท์'] || "").toString().replace(/'/g, ''),
                            picUrl: getProcessedImgUrl((window.allProjects[i]['รูปโปรไฟล์'] || "").toString().trim(), (window.allProjects[i]['ชื่อ'] || "").toString().trim())
                        });
                    }
                }
            }

            let memberHtml = groupMembers.map(m => {
                let isSender = (m.id.toLowerCase() === targetStuId);
                let senderTag = isSender ? ' <span class="bg-cyan-600 text-white px-1.5 py-0.5 rounded-lg text-[8px] sm:text-[9px] font-bold ml-1">ผู้ส่ง</span>' : '';
                return `
                <button type="button" onclick="viewStudentPopup('${m.firstName} ${m.lastName}', '${m.id}', '${m.phone}', '${m.picUrl}')" class="w-full text-left flex items-center gap-2 mt-2 bg-cyan-50 dark:bg-cyan-900/30 hover:bg-cyan-100 dark:hover:bg-cyan-800/50 p-2 sm:p-2.5 rounded-xl border border-cyan-100 dark:border-cyan-800 transition-colors btn-liquid">
                    <img src="${m.picUrl}" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full object-cover border-2 border-white dark:border-slate-600 shadow-sm bg-white" loading="lazy">
                    <div class="flex flex-col leading-tight overflow-hidden"><p class="text-[10px] sm:text-xs font-bold text-slate-700 dark:text-slate-200 truncate">${m.id} ${m.firstName} ${m.lastName}${senderTag}</p></div>
                </button>`;
            }).join('');

            return `<div><span class="font-bold text-slate-800 dark:text-slate-200 bg-slate-100 dark:bg-slate-700 px-2 sm:px-3 py-1 rounded-lg border border-slate-200 dark:border-slate-600 text-[10px] sm:text-xs shadow-sm">${submission['รหัสโครงงาน'] || '-'}</span>${memberHtml}</div>`;
        }

        function renderOverviewTable(projectIds, submissions) {
            const tbody = document.getElementById('overviewTableBody'); tbody.innerHTML = '';
            if (projectIds.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 sm:py-16 text-center text-slate-500">ไม่พบข้อมูล</td></tr>'; return; }
            projectIds.forEach(pid => {
                const members = window.allProjects.filter(p => p['รหัสโครงงาน'] === pid);
                const memberHtml = members.map(m => {
                    const pic = getProcessedImgUrl(m['รูปโปรไฟล์'], m['ชื่อ']);
                    return `<button type="button" onclick="viewStudentPopup('${m['ชื่อ']} ${m['นามสกุล']}', '${m['รหัสนักเรียน']}', '${m['เบอร์โทรศัพท์'] ? m['เบอร์โทรศัพท์'].replace(/'/g, '') : ""}', '${pic}')" class="w-full text-left flex items-center gap-2 sm:gap-3 mb-2 bg-slate-50 dark:bg-slate-800/50 p-2 sm:p-2.5 rounded-xl border border-slate-100 dark:border-slate-700 btn-liquid transition-colors"><img src="${pic}" class="w-7 h-7 sm:w-8 h-8 rounded-full object-cover border-2 border-white dark:border-slate-600 shadow-sm" loading="lazy"><div class="flex flex-col leading-tight overflow-hidden"><span class="text-[10px] sm:text-xs text-slate-700 dark:text-slate-200 font-bold truncate">${m['รหัสนักเรียน']}</span><span class="text-[9px] sm:text-[11px] text-slate-500 dark:text-slate-400 font-medium truncate">${m['ชื่อ']} ${m['นามสกุล']}</span></div></button>`;
                }).join('');
                const memberIds = members.map(m => m['รหัสนักเรียน']); const projectSubs = submissions.filter(s => s && (s['รหัสโครงงาน'] == pid || memberIds.includes(s['รหัสนักเรียน'])));
                const getStatusBadge = (workType) => {
                    const subs = projectSubs.filter(s => (s['ประเภทงาน'] || s['ประเภทงาน (โครงร่าง/ความก้าวหน้า/สมบูรณ์)']) === workType);
                    if (subs.length === 0) return `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[10px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-400 opacity-60">➖ ยังไม่ส่ง</span>`;
                    const status = subs[subs.length - 1]['สถานะ'] || subs[subs.length - 1]['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'];
                    if (status === 'อนุมัติ') return `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[10px] font-bold bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 flex items-center justify-center"><i data-lucide="check-circle" class="w-3 h-3 mr-1"></i> อนุมัติ</span>`;
                    if (status === 'ไม่อนุมัติ') return `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[10px] font-bold bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 flex items-center justify-center"><i data-lucide="x-circle" class="w-3 h-3 mr-1"></i> ไม่อนุมัติ</span>`;
                    return `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[10px] font-bold bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 flex items-center justify-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> รออนุมัติ</span>`;
                };
                const tr = document.createElement('tr'); tr.className = "border-b border-slate-100 dark:border-slate-700/50 hover:bg-cyan-50/30 dark:hover:bg-cyan-900/20 transition-colors";
                tr.innerHTML = `<td class="px-2 py-4 sm:px-4 sm:py-5 align-top font-bold text-slate-800 dark:text-slate-200 text-xs sm:text-sm border-r border-slate-50 dark:border-slate-700/50">${pid}</td><td class="px-2 py-2 sm:px-4 sm:py-3 align-top border-r border-slate-50 dark:border-slate-700/50">${memberHtml}</td><td class="px-2 py-4 sm:px-4 sm:py-5 align-top text-center">${getStatusBadge('โครงร่าง (Proposal)')}</td><td class="px-2 py-4 sm:px-4 sm:py-5 align-top text-center">${getStatusBadge('รายงานความก้าวหน้า')}</td><td class="px-2 py-4 sm:px-4 sm:py-5 align-top text-center">${getStatusBadge('รายงานฉบับสมบูรณ์')}</td>`;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function renderAllWorksTable(works) {
            const tbody = document.getElementById('allWorksTableBody'); tbody.innerHTML = '';
            if (works.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 sm:py-16 text-center text-slate-500 text-xs sm:text-sm">ไม่พบข้อมูล</td></tr>'; return; }
            works.forEach(item => {
                // 🔥 แก้ปัญหา undefined ให้ดึงชื่อตัวใดตัวหนึ่งมาใช้
                const workType = item['ประเภทงาน'] || item['ประเภทงาน (โครงร่าง/ความก้าวหน้า/สมบูรณ์)'] || 'ไม่ระบุ';
                const status = item['สถานะ'] || item['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'] || 'รออนุมัติ';

                let badge = status === 'อนุมัติ' ? `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[11px] font-bold bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 shadow-sm flex items-center justify-center"><i data-lucide="check-circle" class="w-3 h-3 mr-1"></i>อนุมัติแล้ว</span>` : status === 'ไม่อนุมัติ' ? `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[11px] font-bold bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 shadow-sm flex items-center justify-center"><i data-lucide="x-circle" class="w-3 h-3 mr-1"></i>ไม่อนุมัติ</span>` : `<span class="px-2 py-1 rounded-lg text-[9px] sm:text-[11px] font-bold bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 shadow-sm flex items-center justify-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i>รออนุมัติ</span>`;
                const tr = document.createElement('tr'); tr.className = "border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50/80 dark:hover:bg-slate-800/30 transition-colors";
                tr.innerHTML = `
                    <td class="px-2 py-4 sm:px-4 sm:py-5 text-[10px] sm:text-xs text-slate-500 align-middle">${formatDateTime(item['Timestamp'])}</td>
                    <td class="px-2 py-3 sm:px-4 sm:py-4 align-middle">${generateStudentInfoHtml(item)}</td>
                    <td class="px-2 py-4 sm:px-4 sm:py-5 font-bold text-cyan-700 dark:text-cyan-400 text-[10px] sm:text-sm align-middle leading-tight">${workType}</td>
                    <td class="px-2 py-4 sm:px-4 sm:py-5 text-center align-middle">
                        <div class="flex flex-col gap-1.5">
                            <a href="${item['URL ไฟล์เล่ม']}" target="_blank" class="btn-liquid bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 px-2 py-1.5 rounded-lg text-[9px] sm:text-xs font-bold border border-blue-100 dark:border-blue-800 flex items-center justify-center"><i data-lucide="file-text" class="w-3 h-3 mr-1"></i>รูปเล่ม</a>
                            <a href="${item['URL ลายเซ็น']}" target="_blank" class="btn-liquid bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 px-2 py-1.5 rounded-lg text-[9px] sm:text-xs font-bold border border-amber-100 dark:border-amber-800 flex items-center justify-center"><i data-lucide="pen-tool" class="w-3 h-3 mr-1"></i>หน้าลายเซ็น</a>
                        </div>
                    </td>
                    <td class="px-2 py-4 sm:px-4 sm:py-5 text-center align-middle">${badge}</td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        loadDashboard();
    </script>
</body>
</html>
