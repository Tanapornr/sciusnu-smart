<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - โครงการ วมว. มน.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        .swal2-popup { font-family: inherit; border-radius: 1.5rem !important; }
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .swal2-actions { margin-top: 1.5em !important; }
    </style>
</head>
<body class="font-sans pb-10">

    <nav class="bg-cyan-900 border-b border-cyan-800 px-4 sm:px-6 py-4 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div>
                    <h1 class="text-lg sm:text-xl font-bold text-white flex items-center"><span class="mr-2">👑</span> Administrator</h1>
                    <p class="text-xs sm:text-sm text-cyan-200 mt-1">ผู้ดูแลระบบ: โครงการ วมว. มน.</p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs sm:text-sm w-full sm:w-auto text-red-300 hover:text-red-200 hover:bg-cyan-800 px-5 py-2.5 rounded-xl transition-colors font-medium border border-cyan-700 shadow-sm">
                ออกจากระบบ
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto mt-4 sm:mt-8 px-3 sm:px-4 space-y-4 sm:space-y-6">

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-6 flex flex-col items-center">
            <h2 class="text-base sm:text-lg font-bold text-slate-800 mb-4 w-full">🔍 ค้นหาข้อมูลนักเรียน / โครงงาน</h2>
            <div class="relative w-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="พิมพ์ รหัสโครงงาน, รหัสนักเรียน หรือ ชื่อ-นามสกุล..." class="w-full pl-11 pr-4 py-3.5 sm:py-4 text-sm sm:text-base rounded-2xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100 outline-none transition-all placeholder-slate-400 text-slate-700 font-medium">
            </div>
        </div>

        <div id="loadingData" class="text-center py-10 sm:py-16 text-sm text-slate-500 flex flex-col items-center bg-white rounded-2xl shadow-sm border border-slate-200">
            <svg class="animate-spin h-6 w-6 sm:h-8 sm:w-8 text-cyan-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            กำลังโหลดข้อมูลทั้งระบบ...
        </div>

        <div id="overviewSection" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-6 hidden relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-cyan-500"></div>
            <h2 class="text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-5 border-b pb-2 sm:pb-3 flex items-center ml-2">
                <span class="text-xl sm:text-2xl mr-2">📊</span> ภาพรวมโครงงานทั้งหมดในระบบ
            </h2>
            <div class="overflow-x-auto w-full pb-2">
                <table class="w-full text-left text-slate-600">
                    <thead class="bg-slate-50 text-slate-700 uppercase border-b border-slate-200 text-[10px] sm:text-sm">
                        <tr>
                            <th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold whitespace-nowrap">รหัสโครงงาน</th>
                            <th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold min-w-[150px]">นักเรียนในกลุ่ม</th>
                            <th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">โครงร่าง</th>
                            <th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">ความก้าวหน้า</th>
                            <th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">ฉบับสมบูรณ์</th>
                        </tr>
                    </thead>
                    <tbody id="overviewTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="allWorksSection" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 sm:p-6 hidden relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-slate-400"></div>
            <h2 class="text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-5 border-b pb-2 sm:pb-3 flex items-center ml-2">
                <span class="text-xl sm:text-2xl mr-2">📁</span> ประวัติการส่งงานทั้งหมด
            </h2>
            <div class="overflow-x-auto w-full pb-2">
                <table class="w-full text-left text-slate-600">
                    <thead class="bg-slate-50 text-slate-700 uppercase border-b border-slate-200 text-[10px] sm:text-sm">
                        <tr><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold">เวลา</th><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold min-w-[150px]">ข้อมูลนักเรียน</th><th class="px-2 py-3 sm:px-4 sm:py-4 font-semibold">ประเภทงาน</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">ไฟล์แนบ</th><th class="px-2 py-3 sm:px-4 sm:py-4 text-center font-semibold">สถานะปัจจุบัน</th></tr>
                    </thead>
                    <tbody id="allWorksTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🚨 นำ URL ของ Web App มาวางที่นี่ 🚨
        const API_URL = 'https://script.google.com/macros/s/AKfycbwRXtWWuvBM8IjSBBKg4PTxhw3XSY7j8UJsPhJE_vjKdksV9NU-xqzuF-0FmYVIfV7H_w/exec';
        
        const adminRole = localStorage.getItem('userRole'); 
        
        if (adminRole !== 'admin') window.location.href = 'index.html'; 

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        function getDirectImageUrl(url) {
            if (!url) return "";
            if (url.includes('drive.google.com')) {
                const match = url.match(/[-\w]{25,}/);
                if (match) return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w500`;
            }
            return url;
        }

        // ฟังก์ชันเปิด Popup โชว์ข้อมูลนักเรียน
        function viewStudentPopup(name, id, phone, picUrl) {
            Swal.fire({
                html: `
                    <div class="text-center pt-2">
                        <img src="${picUrl}" class="w-24 h-24 sm:w-32 sm:h-32 rounded-full object-cover mx-auto mb-4 border-[4px] border-cyan-50 shadow-md bg-white" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random'">
                        <h3 class="text-lg sm:text-xl font-bold text-slate-800 leading-tight">${name}</h3>
                        <p class="text-xs sm:text-sm text-slate-500 mb-5 mt-1">รหัสประจำตัว: ${id}</p>
                        <div class="bg-cyan-50 rounded-2xl p-3 sm:p-4 inline-block shadow-inner w-full max-w-[200px] sm:max-w-xs border border-cyan-100">
                            <p class="text-[10px] sm:text-xs text-cyan-600 mb-1 font-semibold uppercase tracking-wider">เบอร์โทรศัพท์ติดต่อ</p>
                            <p class="text-base sm:text-lg font-bold text-cyan-800 flex items-center justify-center gap-2">📞 ${phone || 'ไม่มีข้อมูล'}</p>
                        </div>
                    </div>
                `,
                showConfirmButton: true, confirmButtonText: 'ปิดหน้าต่าง', confirmButtonColor: '#334155', customClass: { popup: 'rounded-[2rem] p-4 sm:p-6' }, backdrop: `rgba(15, 23, 42, 0.7)`
            });
        }

        // ตัวแปรเก็บข้อมูลทั้งหมดเพื่อใช้ค้นหา
        window.allProjects = [];
        window.allSubmissions = [];

        async function loadDashboard() {
            try {
                const response = await fetch(API_URL); const data = await response.json();
                if (data.status === 'success') {
                    window.allProjects = data.projects || [];
                    window.allSubmissions = data.submissions || [];
                    
                    const allProjectIds = [...new Set(window.allProjects.map(p => p['รหัสโครงงาน']).filter(id => id && id.toString().trim() !== ""))];
                    
                    renderOverviewTable(allProjectIds, window.allSubmissions);
                    renderAllWorksTable(window.allSubmissions.slice().reverse()); // Copy and reverse
                    
                    document.getElementById('loadingData').style.display = 'none';
                    document.getElementById('overviewSection').classList.remove('hidden');
                    document.getElementById('allWorksSection').classList.remove('hidden');
                }
            } catch (error) { document.getElementById('loadingData').innerHTML = `<span class="text-red-500 font-semibold">❌ โหลดข้อมูลล้มเหลว</span>`; }
        }

        // 🔥 ระบบกรองข้อมูล (Search) ทำงานทันทีที่พิมพ์ 🔥
        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // กรองโปรเจค
            const filteredProjects = window.allProjects.filter(p => {
                const pid = (p['รหัสโครงงาน'] || "").toString().toLowerCase();
                const sid = (p['รหัสนักเรียน'] || "").toString().toLowerCase();
                const name = `${p['ชื่อ'] || ""} ${p['นามสกุล'] || ""}`.toLowerCase();
                return pid.includes(query) || sid.includes(query) || name.includes(query);
            });
            const filteredProjectIds = [...new Set(filteredProjects.map(p => p['รหัสโครงงาน']).filter(id => id))];

            // กรองงานที่ส่ง
            const filteredSubmissions = window.allSubmissions.filter(s => {
                const pid = (s['รหัสโครงงาน'] || "").toString().toLowerCase();
                const sid = (s['รหัสนักเรียน'] || "").toString().toLowerCase();
                const name = `${s['ชื่อ'] || ""} ${s['นามสกุล'] || ""}`.toLowerCase();
                return pid.includes(query) || sid.includes(query) || name.includes(query);
            });

            renderOverviewTable(filteredProjectIds, window.allSubmissions); // ให้ overview โชว์ตัวที่ตรงกับโปรเจค
            renderAllWorksTable(filteredSubmissions.slice().reverse());
        }

        function generateStudentInfoHtml(submission) {
            const projectId = submission['รหัสโครงงาน'] || "-";
            const uploaderId = submission['รหัสนักเรียน'];
            const teamMembers = window.allProjects.filter(p => p && p['รหัสโครงงาน'] == projectId);
            let uploaderInfo = ""; let partnerInfo = "";

            const uploader = teamMembers.find(m => m['รหัสนักเรียน'] == uploaderId);
            if (uploader) {
                const rawPic = uploader['รูปโปรไฟล์'] || ""; const fullName = `${uploader['ชื่อ']} ${uploader['นามสกุล']}`; const phone = uploader['เบอร์โทรศัพท์'] ? uploader['เบอร์โทรศัพท์'].replace(/'/g, '') : ""; const pic = rawPic ? getDirectImageUrl(rawPic) : `https://ui-avatars.com/api/?name=${encodeURIComponent(uploader['ชื่อ'])}&background=random`;
                uploaderInfo = `
                    <button type="button" onclick="viewStudentPopup('${fullName}', '${uploader['รหัสนักเรียน']}', '${phone}', '${pic}')" class="w-full text-left flex items-center gap-2 mt-2 bg-cyan-50 hover:bg-cyan-100 p-2 sm:p-2.5 rounded-xl border border-cyan-100 transition-colors outline-none focus:ring-2 focus:ring-cyan-200">
                        <img src="${pic}" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full object-cover border-2 border-white shadow-sm bg-white" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(uploader['ชื่อ'])}&background=random'">
                        <div class="flex flex-col leading-tight overflow-hidden">
                            <p class="text-[10px] sm:text-xs font-bold text-slate-700 truncate">${uploader['รหัสนักเรียน']} ${uploader['ชื่อ']} <span class="bg-cyan-600 text-white px-1.5 sm:px-2 py-0.5 rounded-lg text-[8px] sm:text-[9px] font-bold ml-1">ผู้ส่ง</span></p>
                        </div>
                    </button>`;
            }

            const partners = teamMembers.filter(m => m['รหัสนักเรียน'] != uploaderId);
            if (partners.length > 0) {
                partnerInfo = partners.map(p => {
                    const rawPic = p['รูปโปรไฟล์'] || ""; const fullName = `${p['ชื่อ']} ${p['นามสกุล']}`; const phone = p['เบอร์โทรศัพท์'] ? p['เบอร์โทรศัพท์'].replace(/'/g, '') : ""; const pic = rawPic ? getDirectImageUrl(rawPic) : `https://ui-avatars.com/api/?name=${encodeURIComponent(p['ชื่อ'])}&background=random`;
                    return `
                    <button type="button" onclick="viewStudentPopup('${fullName}', '${p['รหัสนักเรียน']}', '${phone}', '${pic}')" class="w-full text-left flex items-center gap-2 mt-1.5 px-2 py-1.5 hover:bg-slate-50 rounded-lg transition-colors outline-none focus:ring-2 focus:ring-slate-200">
                        <img src="${pic}" class="w-6 h-6 sm:w-7 sm:h-7 rounded-full object-cover border border-slate-200 bg-white opacity-90" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p['ชื่อ'])}&background=random'">
                        <div class="flex flex-col leading-tight overflow-hidden"><p class="text-[9px] sm:text-[10px] font-semibold text-slate-600 truncate">👥 ${p['รหัสนักเรียน']} ${p['ชื่อ']}</p></div>
                    </button>`;
                }).join('');
            } else { partnerInfo = `<p class="mt-2 text-[10px] text-slate-400 italic px-2">ทำโครงงานเดี่ยว</p>`; }

            return `<div><span class="font-bold text-slate-800 bg-slate-100 px-2 sm:px-3 py-1 rounded-lg border border-slate-200 text-[10px] sm:text-xs shadow-sm">${projectId}</span>${uploaderInfo}${partnerInfo}</div>`;
        }

        function renderOverviewTable(projectIds, submissions) {
            const tbody = document.getElementById('overviewTableBody'); tbody.innerHTML = '';
            if (projectIds.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 sm:py-16 text-center text-slate-500 text-xs sm:text-sm">ไม่พบข้อมูลที่ค้นหา</td></tr>'; return; }

            projectIds.forEach(pid => {
                const members = window.allProjects.filter(p => p['รหัสโครงงาน'] === pid);
                
                const memberHtml = members.map(m => {
                    const rawPic = m['รูปโปรไฟล์'] || ""; const fullName = `${m['ชื่อ']} ${m['นามสกุล']}`; const phone = m['เบอร์โทรศัพท์'] ? m['เบอร์โทรศัพท์'].replace(/'/g, '') : ""; const pic = rawPic ? getDirectImageUrl(rawPic) : `https://ui-avatars.com/api/?name=${encodeURIComponent(m['ชื่อ'])}&background=random`;
                    return `
                    <button type="button" onclick="viewStudentPopup('${fullName}', '${m['รหัสนักเรียน']}', '${phone}', '${pic}')" class="w-full text-left flex items-center gap-2 sm:gap-3 mb-2 bg-slate-50 hover:bg-slate-100 p-2 sm:p-2.5 rounded-xl border border-slate-100 transition-colors focus:ring-2 focus:ring-cyan-100 outline-none shadow-sm">
                        <img src="${pic}" class="w-7 h-7 sm:w-8 h-8 rounded-full object-cover border-2 border-white shadow-sm" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(m['ชื่อ'])}&background=random'">
                        <div class="flex flex-col leading-tight overflow-hidden">
                            <span class="text-[10px] sm:text-xs text-slate-700 font-bold truncate">${m['รหัสนักเรียน']}</span>
                            <span class="text-[9px] sm:text-[11px] text-slate-500 font-medium truncate">${m['ชื่อ']}</span>
                        </div>
                    </button>`;
                }).join('');

                const memberIds = members.map(m => m['รหัสนักเรียน']);
                const projectSubs = submissions.filter(s => s && (s['รหัสโครงงาน'] == pid || memberIds.includes(s['รหัสนักเรียน'])));

                const getStatusBadge = (workType) => {
                    const subs = projectSubs.filter(s => s['ประเภทงาน (โครงร่าง/ความก้าวหน้า/สมบูรณ์)'] === workType);
                    if (subs.length === 0) return `<span class="px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold bg-slate-100 text-slate-400 border border-slate-200 whitespace-nowrap">➖ ยังไม่ส่ง</span>`;
                    const status = subs[subs.length - 1]['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'];
                    if (status === 'อนุมัติ') return `<span class="px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 whitespace-nowrap">✅ อนุมัติ</span>`;
                    if (status === 'ไม่อนุมัติ') return `<span class="px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold bg-rose-50 text-rose-700 border border-rose-200 whitespace-nowrap">❌ ไม่อนุมัติ</span>`;
                    return `<span class="px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-200 whitespace-nowrap">⏳ รออนุมัติหลัก</span>`;
                };

                const tr = document.createElement('tr'); tr.className = "border-b border-slate-100 hover:bg-cyan-50/30 transition-colors";
                tr.innerHTML = `<td class="px-2 py-4 sm:px-4 sm:py-5 align-top font-bold text-slate-800 text-xs sm:text-sm border-r border-slate-50">${pid}</td><td class="px-2 py-2 sm:px-4 sm:py-3 align-top border-r border-slate-50">${memberHtml}</td><td class="px-2 py-4 sm:px-4 sm:py-5 align-top text-center">${getStatusBadge('โครงร่าง (Proposal)')}</td><td class="px-2 py-4 sm:px-4 sm:py-5 align-top text-center">${getStatusBadge('รายงานความก้าวหน้า')}</td><td class="px-2 py-4 sm:px-4 sm:py-5 align-top text-center">${getStatusBadge('รายงานฉบับสมบูรณ์')}</td>`;
                tbody.appendChild(tr);
            });
        }

        function renderAllWorksTable(works) {
            const tbody = document.getElementById('allWorksTableBody'); tbody.innerHTML = '';
            if (works.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 sm:py-16 text-center text-slate-500 text-xs sm:text-sm">ไม่พบข้อมูลที่ค้นหา</td></tr>'; return; }
            works.forEach(item => {
                const dateObj = new Date(item['Timestamp']); const dateStr = dateObj.toLocaleDateString('th-TH') + '<br><span class="text-[9px] sm:text-[10px] text-slate-400">' + dateObj.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) + '</span>'; const workType = item['ประเภทงาน (โครงร่าง/ความก้าวหน้า/สมบูรณ์)'];
                
                let badge = `<span class="px-2 py-1 sm:px-3 sm:py-1.5 text-[9px] sm:text-[11px] font-bold rounded-lg bg-amber-50 text-amber-700 border border-amber-200 shadow-sm whitespace-nowrap">⏳ รออนุมัติหลัก</span>`;
                if (item['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'] === 'อนุมัติ') badge = `<span class="px-2 py-1 sm:px-3 sm:py-1.5 text-[9px] sm:text-[11px] font-bold rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200 shadow-sm whitespace-nowrap">✅ อนุมัติแล้ว</span>`;
                if (item['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'] === 'ไม่อนุมัติ') badge = `<span class="px-2 py-1 sm:px-3 sm:py-1.5 text-[9px] sm:text-[11px] font-bold rounded-lg bg-rose-50 text-rose-700 border border-rose-200 shadow-sm whitespace-nowrap">❌ ไม่อนุมัติ</span>`;

                const tr = document.createElement('tr'); tr.className = "border-b border-slate-100 hover:bg-cyan-50/30 transition-colors";
                tr.innerHTML = `
                    <td class="px-2 py-4 sm:px-4 sm:py-5 text-[10px] sm:text-xs text-slate-500 align-middle">${dateStr}</td>
                    <td class="px-2 py-3 sm:px-4 sm:py-4 align-middle">${generateStudentInfoHtml(item)}</td>
                    <td class="px-2 py-4 sm:px-4 sm:py-5 font-bold text-cyan-700 text-[10px] sm:text-sm align-middle leading-tight">${workType}</td>
                    <td class="px-2 py-4 sm:px-4 sm:py-5 text-center align-middle">
                        <div class="flex flex-col sm:flex-row gap-1 sm:gap-2 justify-center">
                            <a href="${item['URL ไฟล์เล่ม']}" target="_blank" class="bg-blue-50 text-blue-700 px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg text-[9px] sm:text-xs font-bold border border-blue-100 hover:bg-blue-100 transition-colors whitespace-nowrap">📄 เล่ม</a>
                            <a href="${item['URL ลายเซ็น']}" target="_blank" class="bg-amber-50 text-amber-700 px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg text-[9px] sm:text-xs font-bold border border-amber-100 hover:bg-amber-100 transition-colors whitespace-nowrap">✍️ ลายเซ็น</a>
                        </div>
                    </td>
                    <td class="px-2 py-4 sm:px-4 sm:py-5 text-center align-middle">${badge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        loadDashboard();
    </script>
</body>
