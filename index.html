<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - โครงการ วมว. มน.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #f8fafc;
        }
        /* เอฟเฟกต์กระจก (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }
        /* แอนิเมชันของเล่นพื้นหลัง */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-indigo-50 via-white to-purple-50">

    <div class="absolute top-0 left-10 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob"></div>
    <div class="absolute top-0 right-10 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-40 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-4000"></div>

    <div class="w-full max-w-md p-8 m-4 rounded-3xl glass-card relative z-10">
        
        <div class="text-center mb-8">
            <img src="https://img1.pic.in.th/images/logo-banner-scius.png" alt="logo banner scius" border="0" class="w-4/5 mx-auto drop-shadow-sm hover:scale-105 transition-transform duration-300">
            <h2 class="mt-4 text-xl font-bold text-slate-800">ระบบส่งงานโครงงาน</h2>
            <p class="text-sm text-slate-500 mt-1">โครงการ วมว. มหาวิทยาลัยนเรศวร</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <div class="mb-6">
                <p class="text-sm font-medium text-slate-700 mb-3 text-center">เข้าใช้งานในสถานะ</p>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="student" class="peer sr-only" checked onchange="changeRole('student')">
                        <div class="rounded-xl border-2 border-transparent bg-slate-50 p-4 text-center text-slate-500 hover:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 peer-checked:shadow-sm transition-all duration-200">
                            <div class="text-3xl mb-2 drop-shadow-sm">🎓</div>
                            <div class="font-semibold text-sm">นักเรียน</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="advisor" class="peer sr-only" onchange="changeRole('advisor')">
                        <div class="rounded-xl border-2 border-transparent bg-slate-50 p-4 text-center text-slate-500 hover:bg-purple-50 peer-checked:border-purple-500 peer-checked:bg-purple-50 peer-checked:text-purple-700 peer-checked:shadow-sm transition-all duration-200">
                            <div class="text-3xl mb-2 drop-shadow-sm">👩‍🏫</div>
                            <div class="font-semibold text-sm">อาจารย์</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <label id="inputLabel" class="block text-sm font-medium text-slate-700 mb-2">รหัสนักเรียน</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400" id="inputIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>
                    </div>
                    <input type="text" id="userId" required placeholder="กรอกรหัสนักเรียน 8 หลัก..." 
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-700 shadow-inner">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold py-3.5 rounded-xl hover:from-indigo-600 hover:to-purple-700 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                🚀 เข้าสู่ระบบ
            </button>

        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400">© 2026 SCiUS Naresuan University.</p>
        </div>
    </div>

    <script>
        // เคลียร์ข้อมูลเก่าทุกครั้งที่เปิดหน้า Login
        localStorage.clear();

        // ฟังก์ชันเปลี่ยนหน้าตาช่องกรอกข้อมูลตามสถานะที่เลือก
        function changeRole(role) {
            const label = document.getElementById('inputLabel');
            const input = document.getElementById('userId');
            
            if (role === 'student') {
                label.innerText = 'รหัสนักเรียน';
                input.placeholder = 'กรอกรหัสนักเรียน 8 หลัก...';
                input.type = 'number';
            } else {
                label.innerText = 'ชื่อ-นามสกุล อาจารย์ที่ปรึกษา';
                input.placeholder = 'เช่น วันดี หรือ ดร.สุจิตรา';
                input.type = 'text';
            }
            
            // ล้างช่องกรอกข้อมูล
            input.value = '';
            input.focus();
        }

        // ฟังก์ชันจัดการตอนกดปุ่มเข้าสู่ระบบ
        function handleLogin(e) {
            e.preventDefault();
            
            const role = document.querySelector('input[name="role"]:checked').value;
            const userId = document.getElementById('userId').value.trim();

            if (!userId) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ลืมกรอกข้อมูลหรือเปล่า?',
                    text: 'กรุณากรอกข้อมูลให้ครบถ้วนก่อนเข้าสู่ระบบครับ',
                    confirmButtonColor: '#6366f1',
                    confirmButtonText: 'ตกลง'
                });
                return;
            }

            // บันทึกข้อมูลลงในเครื่อง เพื่อให้หน้าเว็บอื่นดึงไปใช้ได้
            localStorage.setItem('currentUser', userId);
            localStorage.setItem('userRole', role);

            // แสดงป๊อปอัปสำเร็จแล้วเปลี่ยนหน้า
            Swal.fire({
                icon: 'success',
                title: 'ยินดีต้อนรับ!',
                text: 'กำลังพาท่านเข้าสู่ระบบ...',
                showConfirmButton: false,
                timer: 1200,
                backdrop: `rgba(0,0,123,0.3)`
            }).then(() => {
                if (role === 'student') {
                    window.location.href = 'student.html'; // ไปหน้าเด็ก
                } else {
                    window.location.href = 'advisor.html'; // ไปหน้าอาจารย์
                }
            });
        }
    </script>
</body>
</html>
