<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - โครงการ วมว. มน.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(40px, -60px) scale(1.2); } 66% { transform: translate(-30px, 30px) scale(0.8); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 8s infinite alternate; } .animation-delay-2000 { animation-delay: 2s; } .animation-delay-4000 { animation-delay: 4s; }
        .swal2-popup { font-family: inherit; border-radius: 1.5rem !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-900 p-4">

    <div class="absolute top-10 left-10 w-64 h-64 sm:w-96 sm:h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[80px] sm:blur-[100px] opacity-40 animate-blob"></div>
    <div class="absolute top-0 right-10 w-64 h-64 sm:w-96 sm:h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[80px] sm:blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-10 left-1/4 w-64 h-64 sm:w-96 sm:h-96 bg-pink-600 rounded-full mix-blend-screen filter blur-[80px] sm:blur-[100px] opacity-30 animate-blob animation-delay-4000"></div>

    <div class="w-full max-w-md p-6 sm:p-8 rounded-[2rem] glass-card relative z-10">
        <div class="text-center mb-6 sm:mb-8">
            <div class="bg-white/5 p-3 sm:p-4 rounded-2xl inline-block mb-3 border border-white/10 shadow-[0_0_15px_rgba(255,255,255,0.05)]">
                <img src="https://img1.pic.in.th/images/logo-banner-scius.png" alt="logo banner scius" border="0" class="h-12 sm:h-16 mx-auto drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] hover:scale-105 transition-transform duration-300">
            </div>
            <h2 class="text-lg sm:text-xl font-bold text-white tracking-wide">ระบบส่งงานโครงงาน</h2>
            <p class="text-xs sm:text-sm text-slate-400 mt-1">โครงการ วมว. มหาวิทยาลัยนเรศวร</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-xs sm:text-sm font-medium text-slate-300 mb-2">Student ID / Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">👤</div>
                    <input type="text" id="username" required placeholder="" class="w-full pl-10 sm:pl-11 pr-4 py-3 sm:py-3.5 text-sm sm:text-base rounded-xl border border-slate-600 bg-slate-900/80 text-white focus:bg-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-inner">
                </div>
            </div>
            
            <div class="mb-6 sm:mb-8">
                <label class="block text-xs sm:text-sm font-medium text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">🔑</div>
                    <input type="password" id="password" required placeholder="" class="w-full pl-10 sm:pl-11 pr-12 py-3 sm:py-3.5 text-sm sm:text-base rounded-xl border border-slate-600 bg-slate-900/80 text-white focus:bg-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-inner">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-white outline-none transition-colors">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600 text-white font-bold py-3 sm:py-3.5 rounded-xl text-sm sm:text-base hover:from-blue-400 hover:via-indigo-400 hover:to-purple-500 hover:shadow-[0_0_20px_rgba(99,102,241,0.5)] transition-all duration-300 border border-white/10">
                🚀 เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>
        // 🚨 นำ URL ของ Web App มาวางที่นี่ 🚨
        const API_URL = 'https://script.google.com/macros/s/AKfycby6yCxoLU4WP836JIoWLziQ3Btr3ed0iB_BlNv_AInK55ie8D28IpCWqHXUNT74TSr2/exec';
        localStorage.clear();

        // 🔥 ฟังก์ชันสลับการซ่อน/ดู รหัสผ่าน 🔥
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                // เปลี่ยนเป็นไอคอนตาถูกขีดฆ่า
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
            } else {
                pwdInput.type = 'password';
                // เปลี่ยนกลับเป็นไอคอนตาปกติ
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        function getDirectImageUrl(url) {
            if (!url) return "";
            if (url.includes('drive.google.com')) {
                const match = url.match(/[-\w]{25,}/);
                if (match) return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w500`;
            }
            return url;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin inline-block h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังตรวจสอบ...`;

            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: username, password: password }) });
                const responseText = await response.text();
                let result;
                try { result = JSON.parse(responseText); } catch (parseError) { throw new Error("ลิงก์ API ไม่ถูกต้อง หรือลืมอัปเดตสิทธิ์ครับ"); }

                if (result.status === 'success') {
                    localStorage.setItem('userEmail', result.email); 
                    localStorage.setItem('userRole', result.role); 
                    localStorage.setItem('userName', result.name);
                    
                    if (result.role === 'student') {
                        localStorage.setItem('studentId', result.studentId);
                        
                        const directPicUrl = getDirectImageUrl(result.profileUrl);
                        const fallbackPic = `https://ui-avatars.com/api/?name=${encodeURIComponent(result.name)}&background=random`;
                        const finalPic = directPicUrl ? directPicUrl : fallbackPic;

                        Swal.fire({
                            title: 'ยินดีต้อนรับกลับมา!', 
                            text: `คุณ ${result.name} (ID: ${result.studentId})`,
                            imageUrl: finalPic, 
                            imageWidth: 120, imageHeight: 120, imageAlt: 'Profile Image',
                            customClass: { image: 'rounded-full object-cover border-4 border-indigo-100 shadow-lg mx-auto mt-4 mb-2' },
                            showConfirmButton: false, timer: 5000, timerProgressBar: true,
                            background: '#f8fafc', color: '#0f172a', backdrop: `rgba(15, 23, 42, 0.8)`
                        }).then(() => { window.location.href = 'student.html'; });

                    } else {
                        // อาจารย์เข้าสู่ระบบ ไม่มีป๊อปอัปรูป
                        Swal.fire({
                            icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', text: `ยินดีต้อนรับ อาจารย์ ${result.name}`,
                            showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff'
                        }).then(() => {
                            if (result.role === 'advisor') window.location.href = 'advisor.html';
                            else window.location.href = 'viewer.html';
                        });
                    }
                } else throw new Error(result.message);
            } catch (error) { Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบล้มเหลว', text: error.message, background: '#1e293b', color: '#fff', confirmButtonColor: '#3b82f6' });
            } finally { btn.disabled = false; btn.innerHTML = '🚀 เข้าสู่ระบบ'; }
        }
    </script>
</body>
</html>
