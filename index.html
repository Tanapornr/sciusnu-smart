<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการและอนุมัติโครงงานนักเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div class="mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-slate-800">ระบบบริหารจัดการและอนุมัติโครงงานนักเรียน</h1>
            <p class="text-slate-500 mt-1">โครงการ วมว. มหาวิทยาลัยนเรศวร</p>
        </div>
        
        <div class="mb-6 flex justify-between items-center">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อ รหัสนักเรียน หรือชื่อโครงงาน..." 
                   class="w-full md:w-1/3 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div id="loading" class="text-center text-blue-600 font-medium py-8">
            กำลังโหลดข้อมูลโครงงาน...
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200 hidden" id="tableContainer">
            <table class="w-full text-sm text-left text-slate-600">
                <thead class="text-xs text-slate-700 uppercase bg-slate-100">
                    <tr>
                        <th class="px-4 py-3">รหัสนักเรียน</th>
                        <th class="px-4 py-3">ชื่อ-นามสกุล</th>
                        <th class="px-4 py-3">รหัสโครงงาน</th>
                        <th class="px-4 py-3">ชื่อโครงงาน 1</th>
                        <th class="px-4 py-3">อ.ที่ปรึกษา TH</th>
                        <th class="px-4 py-3 text-center">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // *** นำ URL ของ Google Apps Script มาวางแทนที่ตรงนี้ ***
        const API_URL = 'https://script.google.com/macros/s/AKfycbxtQWmzsG8l43M7Z9cq3dCHClGWIg-lIKS91YcVejT05jMpEGS9EbrC2xOItmx_Pvo-rA/exec';
        let projectsData = [];

        async function loadProjects() {
            try {
                const response = await fetch(API_URL);
                projectsData = await response.json();
                renderTable(projectsData);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableContainer').classList.remove('hidden');
            } catch (error) {
                document.getElementById('loading').innerHTML = '<span class="text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</span>';
                console.error(error);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-slate-50";
                
                // สมมติให้มีคอลัมน์การอนุมัติ หากชีตยังไม่มีให้ขึ้นสถานะรอตรวจสอบไว้ก่อน
                tr.innerHTML = `
                    <td class="px-4 py-3 font-medium text-slate-900">${item['รหัสนักเรียน'] || '-'}</td>
                    <td class="px-4 py-3">${item['ชื่อ'] || ''} ${item['นามสกุล'] || ''}</td>
                    <td class="px-4 py-3 font-semibold text-blue-600">${item['รหัสโครงงาน'] || '-'}</td>
                    <td class="px-4 py-3 max-w-xs truncate" title="${item['ชื่อโครงงาน 1'] || ''}">${item['ชื่อโครงงาน 1'] || '-'}</td>
                    <td class="px-4 py-3">${item['อ. ที่ปรึกษา TH'] || '-'}</td>
                    <td class="px-4 py-3 text-center">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full bg-amber-100 text-amber-700">รออนุมัติ</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ระบบค้นหาข้อมูลแบบ Real-time
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = projectsData.filter(item => {
                return (item['ชื่อ'] || '').toLowerCase().includes(searchTerm) ||
                       (item['นามสกุล'] || '').toLowerCase().includes(searchTerm) ||
                       (item['รหัสนักเรียน'] || '').toLowerCase().includes(searchTerm) ||
                       (item['ชื่อโครงงาน 1'] || '').toLowerCase().includes(searchTerm);
            });
            renderTable(filteredData);
        });

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        loadProjects();
    </script>
</body>
</html>
