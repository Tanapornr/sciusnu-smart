<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - โครงการ วมว. มน.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            /* พื้นหลังสีเข้มอวกาศ ทำให้โลโก้สีขาวเด่นชัด */
            background-color: #0f172a; 
        }
        /* เอฟเฟกต์กระจกสีเข้ม */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* แอนิเมชันแสงออโรร่าด้านหลัง */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.2); }
            66% { transform: translate(-30px, 30px) scale(0.8); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 8s infinite alternate;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        /* ปรับสีป๊อปอัป SweetAlert2 ให้เข้ากับ Dark Mode */
        .swal2-popup { font-family: inherit; border-radius: 1rem !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-900">

    <div class="absolute top-10 left-10 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob"></div>
    <div class="absolute top-0 right-10 w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-40 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-10 left-1/3 w-96 h-96 bg-pink-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-blob animation-delay-4000"></div>

    <div class="w-full max-w-md p-8 m-4 rounded-[2rem] glass-card relative z-10">
        
        <div class="text-center mb-8">
            <div class="bg-white/5 p-4 rounded-2xl inline-block mb-3 border border-white/10 shadow-[0_0_15px_rgba(255,255,255,0.05)]">
                <img src="https://img1.pic.in.th/images/logo-banner-scius.png" alt="logo banner scius" border="0" class="h-16 mx-auto drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] hover:scale-105 transition-transform duration-300">
            </div>
            <h2 class="text-xl font-bold text-white tracking-wide">ระบบส่งงานโครงงาน</h2>
            <p class="text-sm text-slate-400 mt-1">โครงการ วมว. มหาวิทยาลัยนเรศวร</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <div class="mb-6">
                <p class="text-sm font-medium text-slate-300 mb-3 text-center">เข้าใช้งานในสถานะ</p>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="student" class="peer sr-only" checked onchange="changeRole('student')">
                        <div class="rounded-xl border border-slate-600 bg-slate-800/50 p-4 text-center text-slate-400 hover:bg-slate-700/50 peer-checked:border-blue-400 peer-checked:bg-blue-500/20 peer-checked:text-blue-300 peer-checked:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition-all duration-300">
                            <div class="text-3xl mb-2 drop-shadow-md">🎓</div>
                            <div class="font-semibold text-sm">นักเรียน</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="advisor" class="peer sr-only" onchange="changeRole('advisor')">
                        <div class="rounded-xl border border-slate-600 bg-slate-800/50 p-4 text-center text-slate-400 hover:bg-slate-700/50 peer-checked:border-purple-400 peer-checked:bg-purple-500/20 peer-checked:text-purple-300 peer-checked:shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all duration-300">
                            <div class="text-3xl mb-2 drop-shadow-md">👩‍🏫</div>
                            <div class="font-semibold text-sm">อาจารย์</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <label id="inputLabel" class="block text-sm font-medium text-slate-300 mb-2">รหัสนักเรียน</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400" id="inputIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>
                    </div>
                    <input type="text" id="userId" required placeholder="กรอกรหัสนักเรียน 8 หลัก..." 
                        class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-600 bg-slate-900/80 text-white placeholder-slate-500 focus:bg-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-inner">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600 text-white font-bold py-3.5 rounded-xl hover:from-blue-400 hover:via-indigo-400 hover:to-purple-500 hover:shadow-[0_0_20px_rgba(99,102,241,0.5)] hover:-translate-y-0.5 transition-all duration-300 border border-white/10">
                🚀 เข้าสู่ระบบ
            </button>

        </form>

        <div class="mt-8 text-center border-t border-slate-700/50 pt-4">
            <p class="text-xs text-slate-500">© 2026 SCiUS Naresuan University.</p>
        </div>
    </div>

    <script>
        // เคลียร์ข้อมูลเก่าทุกครั้งที่เปิดหน้า Login
        localStorage.clear();

        // ฟังก์ชันเปลี่ยนหน้าตาช่องกรอกข้อมูลตามสถานะที่เลือก
        function changeRole(role) {
            const label = document.getElementById('inputLabel');
            const input = document.getElementById('userId');
            
            if (role === 'student') {
                label.innerText = 'รหัสนักเรียน';
                input.placeholder = 'กรอกรหัสนักเรียน 8 หลัก...';
                input.type = 'number';
            } else {
                label.innerText = 'ชื่อ-นามสกุล อาจารย์ที่ปรึกษา';
                input.placeholder = 'เช่น วันดี หรือ ดร.สุจิตรา';
                input.type = 'text';
            }
            
            input.value = '';
            input.focus();
        }

        // ฟังก์ชันจัดการตอนกดปุ่มเข้าสู่ระบบ
        function handleLogin(e) {
            e.preventDefault();
            
            const role = document.querySelector('input[name="role"]:checked').value;
            const userId = document.getElementById('userId').value.trim();

            if (!userId) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ลืมกรอกข้อมูลหรือเปล่า?',
                    text: 'กรุณากรอกข้อมูลให้ครบถ้วนก่อนเข้าสู่ระบบครับ',
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: 'ตกลง',
                    background: '#1e293b',
                    color: '#fff'
                });
                return;
            }

            // บันทึกข้อมูล
            localStorage.setItem('currentUser', userId);
            localStorage.setItem('userRole', role);

            // แสดงป๊อปอัป
            Swal.fire({
                icon: 'success',
                title: 'ยินดีต้อนรับ!',
                text: 'กำลังพาท่านเข้าสู่ระบบ...',
                showConfirmButton: false,
                timer: 1200,
                background: '#1e293b',
                color: '#fff',
                backdrop: `rgba(0,0,0,0.6)`
            }).then(() => {
                if (role === 'student') {
                    window.location.href = 'student.html';
                } else {
                    window.location.href = 'advisor.html';
                }
            });
        }
    </script>
</body>
</html>
