<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบบริหารจัดการโครงงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบโครงงาน</h1>
            <p class="text-slate-500 text-sm mt-2">โครงการ วมว. มหาวิทยาลัยนเรศวร</p>
        </div>

        <div class="flex mb-6 bg-slate-100 rounded-lg p-1">
            <button id="btnStudent" class="flex-1 py-2 rounded-md bg-white shadow text-blue-600 font-semibold text-sm transition-all">นักเรียน</button>
            <button id="btnAdvisor" class="flex-1 py-2 rounded-md text-slate-500 font-semibold text-sm transition-all hover:bg-slate-200">อาจารย์</button>
        </div>

        <form id="loginForm">
            <div id="studentInput" class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสนักเรียน</label>
                <input type="text" id="studentId" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="ระบุรหัสนักเรียน 8 หลัก">
            </div>

            <div id="advisorInput" class="mb-4 hidden">
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่ออาจารย์ที่ปรึกษา</label>
                <input type="text" id="advisorName" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="ระบุชื่อ-นามสกุลอาจารย์">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        let currentRole = 'student';
        
        // สลับแท็บนักเรียน/อาจารย์
        document.getElementById('btnStudent').addEventListener('click', () => {
            currentRole = 'student';
            document.getElementById('btnStudent').className = "flex-1 py-2 rounded-md bg-white shadow text-blue-600 font-semibold text-sm transition-all";
            document.getElementById('btnAdvisor').className = "flex-1 py-2 rounded-md text-slate-500 font-semibold text-sm transition-all hover:bg-slate-200";
            document.getElementById('studentInput').classList.remove('hidden');
            document.getElementById('advisorInput').classList.add('hidden');
        });

        document.getElementById('btnAdvisor').addEventListener('click', () => {
            currentRole = 'advisor';
            document.getElementById('btnAdvisor').className = "flex-1 py-2 rounded-md bg-white shadow text-blue-600 font-semibold text-sm transition-all";
            document.getElementById('btnStudent').className = "flex-1 py-2 rounded-md text-slate-500 font-semibold text-sm transition-all hover:bg-slate-200";
            document.getElementById('advisorInput').classList.remove('hidden');
            document.getElementById('studentInput').classList.add('hidden');
        });

        // จัดการเมื่อกดเข้าสู่ระบบ
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (currentRole === 'student') {
                const id = document.getElementById('studentId').value.trim();
                if (id) {
                    localStorage.setItem('currentUser', id);
                    localStorage.setItem('userRole', 'student');
                    window.location.href = 'student.html'; // ไปหน้าแดชบอร์ดนักเรียน
                } else {
                    alert('กรุณาระบุรหัสนักเรียน');
                }
            } else {
                const name = document.getElementById('advisorName').value.trim();
                if (name) {
                    localStorage.setItem('currentUser', name);
                    localStorage.setItem('userRole', 'advisor');
                    window.location.href = 'advisor.html'; // ไปหน้าแดชบอร์ดอาจารย์
                } else {
                    alert('กรุณาระบุชื่ออาจารย์');
                }
            }
        });
    </script>
</body>
</html>
