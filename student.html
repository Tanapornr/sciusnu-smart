<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - โครงการ วมว. มน.</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-bold text-blue-700">Student Space</h1>
            <p class="text-sm text-slate-500">รหัสนักเรียน: <span id="displayStudentId" class="font-semibold text-slate-800"></span></p>
        </div>
        <button onclick="logout()" class="text-sm text-red-600 font-medium hover:text-red-800 transition-colors bg-red-50 px-3 py-1 rounded">ออกจากระบบ</button>
    </nav>

    <div class="max-w-6xl mx-auto mt-8 px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            
            <div class="bg-white rounded-xl shadow-sm border p-5">
                <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">📥 ดาวน์โหลดแบบฟอร์ม</h2>
                <ul class="space-y-3 text-sm">
                    <li><a href="#" class="text-blue-600 hover:underline flex items-center">📄 Template โครงร่าง (Proposal)</a></li>
                    <li><a href="#" class="text-blue-600 hover:underline flex items-center">📄 Template รายงานความก้าวหน้า</a></li>
                    <li><a href="#" class="text-blue-600 hover:underline flex items-center">📄 Template รายงานฉบับสมบูรณ์</a></li>
                    <li><a href="#" class="text-blue-600 hover:underline flex items-center">📑 แบบคำร้องต่างๆ</a></li>
                </ul>
            </div>

            <div class="bg-white rounded-xl shadow-sm border p-5">
                <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">📤 ส่งงาน/แบบคำร้อง</h2>
                <form id="uploadForm" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700">ประเภทงาน</label>
                        <select id="workType" required class="w-full text-sm border border-slate-300 rounded-md p-2 bg-white focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="">-- เลือกประเภทงาน --</option>
                            <option value="โครงร่าง (Proposal)">โครงร่าง (Proposal)</option>
                            <option value="รายงานความก้าวหน้า">รายงานความก้าวหน้า</option>
                            <option value="รายงานฉบับสมบูรณ์">รายงานฉบับสมบูรณ์</option>
                            <option value="แบบคำร้อง">แบบคำร้อง</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700">รหัสโครงงาน</label>
                        <input list="projectList" id="projectId" required placeholder="พิมพ์เพื่อค้นหารหัส..." class="w-full text-sm border border-slate-300 rounded-md p-2 bg-white focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <datalist id="projectList"></datalist>
                        <p id="advisorShow" class="text-xs text-slate-500 mt-1 hidden">อ.ที่ปรึกษา: <span id="advisorNameText" class="font-semibold text-blue-600"></span></p>
                    </div>

                    <div class="bg-blue-50 p-3 rounded-md border border-blue-100">
                        <label class="block text-sm font-medium mb-1 text-blue-800">1. ไฟล์รูปเล่ม (PDF)</label>
                        <input type="file" id="fileReport" accept="application/pdf" required class="w-full text-xs text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200">
                    </div>

                    <div class="bg-amber-50 p-3 rounded-md border border-amber-100">
                        <label class="block text-sm font-medium mb-1 text-amber-800">2. หน้าลายเซ็น (PDF)</label>
                        <input type="file" id="fileSignature" accept="application/pdf" required class="w-full text-xs text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">ส่งงาน</button>
                    <div id="uploadStatus" class="text-xs text-center hidden font-medium mt-2"></div>
                </form>
            </div>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white rounded-xl shadow-sm border p-5">
                <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">📋 ประวัติการส่งงาน</h2>
                
                <div id="loadingData" class="text-center py-8 text-sm text-slate-500">กำลังโหลดข้อมูล...</div>
                
                <div class="overflow-x-auto hidden" id="tableContainer">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="bg-slate-100 text-slate-700 text-xs uppercase border-b">
                            <tr>
                                <th class="px-4 py-3">วันที่ส่ง</th>
                                <th class="px-4 py-3">ประเภทงาน</th>
                                <th class="px-4 py-3 text-center">สถานะ</th>
                                <th class="px-4 py-3 text-center">ไฟล์แนบ</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. นำ URL ของ Web App (Google Apps Script) มาวางที่นี่
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbydQG2IFvjqfrOuQu4tbSuXP5U14CD15y1V9wyYkK6_ifZSPNdxOTaIg-9yUCtpNPNZlQ/exec';
        
        // 2. ตรวจสอบการ Login
        const studentId = localStorage.getItem('currentUser');
        if (!studentId) {
            window.location.href = 'index.html'; 
        }
        document.getElementById('displayStudentId').innerText = studentId;

        function logout() { 
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        }

        // 3. ฟังก์ชันโหลดข้อมูล (ป้องกัน Error .find อย่างสมบูรณ์)
        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (data && data.status === 'success') {
                    // เก็บข้อมูลโครงงานไว้ใช้ (ถ้าไม่มีให้เป็น Array ว่าง)
                    window.allProjects = data.projects || [];
                    
                    const pList = document.getElementById('projectList');
                    const uniqueIds = [...new Set(window.allProjects.map(p => p && p['รหัสโครงงาน']).filter(id => id && id.toString().trim() !== ""))];
                    
                    pList.innerHTML = uniqueIds.map(id => `<option value="${id}">`).join('');

                    // ดึงข้อมูลของนักเรียนคนนี้มาใส่ช่องอัตโนมัติ
                    const myProject = window.allProjects.find(p => p && p['รหัสนักเรียน'] === studentId);
                    if (myProject && myProject['รหัสโครงงาน']) {
                        document.getElementById('projectId').value = myProject['รหัสโครงงาน'];
                        showAdvisor(myProject['รหัสโครงงาน']);
                    }

                    // แสดงตารางประวัติ
                    renderTable(data.submissions || []);
                } else {
                    throw new Error(data ? data.message : "ไม่สามารถเชื่อมต่อ API ได้");
                }
            } catch (e) { 
                console.error(e); 
                document.getElementById('loadingData').innerHTML = `<span class="text-red-500">โหลดข้อมูลไม่สำเร็จ: ${e.message}</span>`;
            }
        }

        // 4. ฟังก์ชันแสดงชื่ออาจารย์
        function showAdvisor(pid) {
            const projects = window.allProjects || [];
            const p = projects.find(x => x && x['รหัสโครงงาน'] === pid);
            const show = document.getElementById('advisorShow');
            
            if (p && p['อ. ที่ปรึกษา TH']) {
                document.getElementById('advisorNameText').innerText = p['อ. ที่ปรึกษา TH'];
                show.classList.remove('hidden');
            } else { 
                show.classList.add('hidden'); 
            }
        }

        // เมื่อพิมพ์เปลี่ยนรหัสโครงงาน ให้โชว์ชื่ออาจารย์เปลี่ยนตาม
        document.getElementById('projectId').addEventListener('input', (e) => showAdvisor(e.target.value));

        // 5. ฟังก์ชันสร้างตารางประวัติ
        function renderTable(subs) {
            const tbody = document.getElementById('historyTableBody');
            
            // กรองเฉพาะงานของนักเรียนคนนี้ และเรียงจากใหม่ไปเก่า
            const mySubs = subs.filter(s => s && s['รหัสนักเรียน'] === studentId).reverse();
            
            if(mySubs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-500">ยังไม่มีประวัติการส่งงาน</td></tr>';
            } else {
                tbody.innerHTML = mySubs.map(s => {
                    // จัดการสีสถานะ
                    let statusClass = "bg-amber-100 text-amber-700";
                    if (s['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'] === 'อนุมัติ') statusClass = "bg-green-100 text-green-700";
                    if (s['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)'] === 'ไม่อนุมัติ') statusClass = "bg-red-100 text-red-700";

                    const d = new Date(s['Timestamp']);
                    const dateStr = d.toLocaleDateString('th-TH') + ' ' + d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

                    return `
                    <tr class="border-b hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">${dateStr}</td>
                        <td class="px-4 py-3 font-medium text-slate-700">${s['ประเภทงาน (โครงร่าง/ความก้าวหน้า/สมบูรณ์)']}</td>
                        <td class="px-4 py-3 text-center"><span class="px-2 py-1 rounded-full text-xs font-bold ${statusClass}">${s['สถานะ (รออนุมัติ/อนุมัติ/ไม่อนุมัติ)']}</span></td>
                        <td class="px-4 py-3 text-center space-x-2 whitespace-nowrap">
                            <a href="${s['URL ไฟล์เล่ม']}" target="_blank" class="text-blue-600 bg-blue-50 px-3 py-1 rounded-md text-xs hover:bg-blue-100 transition">📄 เล่ม</a>
                            <a href="${s['URL ลายเซ็น']}" target="_blank" class="text-amber-600 bg-amber-50 px-3 py-1 rounded-md text-xs hover:bg-amber-100 transition">✍️ เซ็น</a>
                        </td>
                    </tr>
                    `;
                }).join('');
            }
            
            document.getElementById('loadingData').style.display = 'none';
            document.getElementById('tableContainer').classList.remove('hidden');
        }

        // 6. ฟังก์ชันแปลงไฟล์ PDF เป็น Base64
        const toBase64 = file => new Promise((res, rej) => {
            const r = new FileReader(); 
            r.readAsDataURL(file);
            r.onload = () => res({ data: r.result.split(',')[1], mime: file.type });
            r.onerror = rej;
        });

        // 7. จัดการกดปุ่มส่งงาน
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('uploadStatus');
            
            btn.disabled = true; 
            btn.innerText = 'กำลังส่ง...';
            btn.classList.replace('bg-blue-600', 'bg-slate-400');
            status.classList.remove('hidden'); 
            status.innerText = '⏳ กำลังอัปโหลดและบันทึกข้อมูล (ห้ามปิดหน้านี้)...';
            status.className = "text-xs text-center block font-medium mt-2 text-slate-600";

            try {
                const f1 = await toBase64(document.getElementById('fileReport').files[0]);
                const f2 = await toBase64(document.getElementById('fileSignature').files[0]);
                
                const pid = document.getElementById('projectId').value;
                const projects = window.allProjects || [];
                const pInfo = projects.find(x => x && x['รหัสโครงงาน'] === pid);

                // สร้าง Payload แบบ 10 คอลัมน์ (ส่ง ชื่อ และ นามสกุล ไปด้วย)
                const payload = {
                    studentId: studentId, 
                    firstName: pInfo && pInfo['ชื่อ'] ? pInfo['ชื่อ'] : "-", 
                    lastName: pInfo && pInfo['นามสกุล'] ? pInfo['นามสกุล'] : "-", 
                    projectId: pid,                         
                    workType: document.getElementById('workType').value,
                    advisorName: pInfo && pInfo['อ. ที่ปรึกษา TH'] ? pInfo['อ. ที่ปรึกษา TH'] : "-",
                    file1Data: f1.data, 
                    file1Mime: f1.mime, 
                    file2Data: f2.data, 
                    file2Mime: f2.mime
                };

                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                if (result && result.status === 'success') {
                    status.innerText = '✅ ส่งงานและบันทึกข้อมูลสำเร็จ!';
                    status.className = "text-sm text-center font-medium mt-3 text-green-600 block";
                    document.getElementById('uploadForm').reset();
                    document.getElementById('advisorShow').classList.add('hidden');
                    
                    // โหลดตารางใหม่
                    document.getElementById('tableContainer').classList.add('hidden');
                    document.getElementById('loadingData').style.display = 'block';
                    loadData();
                } else { 
                    throw new Error(result ? result.message : "ไม่มีการตอบกลับจากเซิร์ฟเวอร์"); 
                }
            } catch (err) { 
                status.innerText = '❌ เกิดข้อผิดพลาด: ' + err.message; 
                status.className = "text-sm text-center font-medium mt-3 text-red-600 block";
            } finally {
                btn.disabled = false; 
                btn.innerText = 'ส่งงาน'; 
                btn.classList.replace('bg-slate-400', 'bg-blue-600');
            }
        });

        // เริ่มโหลดข้อมูลครั้งแรก
        loadData();
    </script>
</body>
</html>
